<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coded Breach: System Compromised</title>
    <style>
        /* --- 1. GLOBAL STYLES (Cinematic Vibe) --- */
        body {
            background-color: black;
            color: #00ff00; /* Neon Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden; /* Prevent scrolling during simulation */
        }

        /* --- 2. THE 3D CANVAS (Visible 0s - 13s) --- */
        #c {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block; /* Visible initially */
        }

        /* --- 3. REVEAL MESSAGE (15s+) --- */
        #revealMessage {
            display: none; /* Hidden by default */
            color: white;
            font-family: Arial, sans-serif;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            animation: textTyping 2s steps(40, end); /* Typing effect for the reveal */
        }

        .finalText {
            font-size: 1.3em;
            font-weight: bold;
            line-height: 1.6;
        }

        .brandName {
            display: block;
            margin-top: 25px;
            font-size: 2.5em;
            color: red;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(255, 0, 0, 0.5);
        }

        /* --- 4. ANIMATIONS (Glitch & Blink) --- */
        @keyframes blink { 50% { opacity: 0; } }

        @keyframes textTyping {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
</head>
<body onload="startBreachPrank()">

    <canvas id="c"></canvas>

    <div id="revealMessage">
        <p class="finalText">SYSTEM ERROR: HUMAN FALLIBILITY.</p>
        <p class="finalText">
            In 2026, the breach isn't digital; it's social.<br>
            Your trust is the backdoor. Wake up.
        </p>
        <p class="finalText">
            You have NOT been hacked.<br>
            ...But it was that easy.
        </p>
        <span class="brandName">Coded Breach</span>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r84/three.min.js"></script>

    <script>
        function startBreachPrank() {
            // Check if the browser supports vibration (Haptics)
            if (!("vibrate" in navigator)) {
                console.log("Haptics not supported. Visuals only.");
            }

            // ==========================================================
            // --- 1. THREE.JS 3D ENGINE SETUP (0s - 13s) ---
            // ==========================================================
            // We set up the basic structure for the AAA graphics.
            const canvas = document.querySelector('#c');
            const renderer = new THREE.WebGLRenderer({canvas, alpha: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            const scene = new THREE.Scene();

            const fov = 75;
            const aspect = window.innerWidth / window.innerHeight;
            const near = 0.1;
            const far = 5;
            const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
            camera.position.z = 2;

            // --- A. THE ARTIFACT: "Neural Breach Cube" ---
            // A complex low-poly geometry that rotates.
            const geometry = new THREE.IcosahedronGeometry(0.5, 0); // AAA Low Poly shape
            const material = new THREE.MeshPhongMaterial({
                color: 0x00ffff, // Cold Cyan
                shading: THREE.FlatShading, // Make it look metallic/geometric
                wireframe: true // AAA Digital look
            });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // --- B. LIGHTING (Cinematic) ---
            const color = 0xFFFFFF;
            const intensity = 1;
            const light = new THREE.DirectionalLight(color, intensity);
            light.position.set(-1, 2, 4);
            scene.add(light);

            const subtleRed = new THREE.PointLight(0x300000, 1, 10); // Red contrast
            subtleRed.position.set(2, 2, 2);
            scene.add(subtleRed);

            // --- C. THE GLITCH SHADER EFFECT (AAA Visuals) ---
            // We're using a simple shader to create a CRT-style flicker/glitch.
            // This replaces the complex post-processing stack for performance.
            let time = 0;
            material.onBeforeCompile = (shader) => {
                shader.uniforms.time = { value: 0 };
                shader.vertexShader = `
                    uniform float time;
                    ${shader.vertexShader}
                `.replace(
                    `#include <begin_vertex>`,
                    `
                    #include <begin_vertex>
                    // Glitch the geometry slightly using time
                    transformed.x += sin(time * 10.0 + transformed.y * 5.0) * 0.05;
                    transformed.y += cos(time * 10.0 + transformed.x * 5.0) * 0.05;
                    `
                );
                material.userData.shader = shader;
            };


            // --- D. THE ANIMATION LOOP (Core 3D heartbeat) ---
            function render() {
                time += 0.01;
                // Only animate and render if the canvas is visible
                if (canvas.style.display !== 'none') {
                    mesh.rotation.x += 0.005;
                    mesh.rotation.y += 0.01;

                    // Update the glitch shader time
                    if (material.userData.shader) {
                        material.userData.shader.uniforms.time.value = time;
                    }

                    renderer.render(scene, camera);
                }
                requestAnimationFrame(render);
            }
            requestAnimationFrame(render);


            // ==========================================================
            // --- PHASE 2: Haptic Compromise (Seconds 3 - 13) ---
            // ==========================================================
            // Wait 3 seconds, then start the random, unsettling vibration pattern.
            setTimeout(() => {
                if ("vibrate" in navigator) {
                    navigator.vibrate([
                        50, 100, 50, 200, 1500,  // Stutter, long rumble
                        200, 1000,               // Pause
                        50, 50, 50, 200,          // Quick triple tap
                        3000, 500,                // Long vibration
                        100, 100, 100             // Staccato bursts
                    ]);
                }
            }, 3000); // Trigger after a 3-second suspense delay.


            // ==========================================================
            // --- PHASE 3: The Reveal (Second 15+) ---
            // ==========================================================
            // After 15 seconds, clear the screen and show the final message.
            setTimeout(() => {
                // 1. Stop all vibration.
                if ("vibrate" in navigator) {
                    navigator.vibrate(0);
                }

                // 2. Hide the 3D visual engine entirely.
                canvas.style.display = 'none';

                // 3. Display the final message.
                document.getElementById('revealMessage').style.display = 'block';

                // 4. Finalize the shift with a dark red background.
                document.body.style.backgroundColor = '#200000';
            }, 15000); // Total prank duration is 15 seconds.
        }
    </script>
</body>
</html>
