<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coded Breach: System Compromised</title>
    <style>
        /* --- 1. GLOBAL STYLES --- */
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        /* --- 2. PHASE 1: THE TRAP --- */
        #lureDisplay {
            width: 80%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #lureTitle {
            font-size: 1.5em;
            color: white;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        #lureButton {
            background: none;
            color: #00ff00;
            border: 2px solid #00ff00;
            font-family: inherit;
            font-size: 1.4em;
            padding: 20px 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: blink 1.2s infinite;
        }

        /* --- 3. PHASE 2: ATTACK PROGRESS --- */
        #attackDisplay {
            width: 85%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #alertTitle {
            color: red;
            font-size: 2em;
            text-transform: uppercase;
            animation: blink 0.5s infinite;
            margin-bottom: 20px;
        }

        #progressBarContainer {
            width: 100%;
            height: 30px;
            border: 2px solid #00ff00;
            background-color: #1a1a1a;
            position: relative;
            margin-bottom: 15px;
        }

        #progressBar {
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            position: absolute;
            top: 0;
            left: 0;
            transition: width 1s linear;
        }

        #countdown {
            font-size: 3em;
            color: white;
            font-weight: bold;
            font-family: sans-serif;
            text-shadow: 2px 2px 10px rgba(0, 255, 0, 0.5);
        }

        /* --- 4. PHASE 3: THE SCARY REVEAL --- */
        #revealMessage {
            display: none;
            color: white;
            font-family: Arial, sans-serif;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
        }

        .finalText {
            font-size: 1.2em;
            font-weight: bold;
            line-height: 1.5;
            animation: textTyping 3.5s steps(50, end);
            white-space: pre-wrap;
            width: 100%;
            overflow: hidden;
        }

        /* --- 5. PHASE 4: THE SAFETY REVEAL --- */
        #safetyReveal {
            display: none;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
        }

        .finalSafetyText {
            font-size: 1.5em;
            font-weight: bold;
            line-height: 1.8;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0, 255, 0, 0.5);
            margin-bottom: 20px;
        }

        .brandName {
            display: block;
            margin-top: 35px;
            font-size: 2.5em;
            color: red;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(255, 0, 0, 0.5);
        }

        /* --- 6. ANIMATIONS --- */
        @keyframes blink { 50% { opacity: 0; } }
        
        @keyframes textTyping {
            from { width: 0; }
            to { width: 100%; }
        }

        #attackDisplay { animation: crtFlicker 0.15s infinite; }
        @keyframes crtFlicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }
    </style>
</head>
<body id="breachBody">

    <div id="lureDisplay">
        <h1 id="lureTitle"></h1>
        <button id="lureButton"></button>
    </div>

    <div id="attackDisplay">
        <h1 id="alertTitle"></h1>
        <p id="attackSub"></p>
        <div id="progressBarContainer">
            <div id="progressBar"></div>
        </div>
        <div id="countdown">10</div>
    </div>

    <div id="revealMessage">
        <p class="finalText" id="scaryText"></p>
    </div>

    <div id="safetyReveal">
        <p class="finalSafetyText" id="safetyTitle"></p>
        <p class="finalSafetyText" id="safetyText"></p>
        <span class="brandName">Coded Breach</span>
    </div>

    <script>
        const PRANK_TRANSLATIONS = {
            'en': {
                'lureTitle': 'CRITICAL SYSTEM ERROR.<br>MANUAL RESET REQUIRED.',
                'lureButton': 'CONFIRM RESET<br>(If you dare)',
                'alertTitle': '!!! COMPROMISING DEVICE !!!',
                'attackSub': 'REVERSE BREACH INITIALIZING...',
                'scaryReveal': 'SYSTEM_STATUS: COMPROMISED.\n\nWhile you watched that countdown, our **AI Proxy Bot** completed its data exfiltration sweep.\n\nWe have **everything**.\n...The unread texts.\n...The embarrassing selfies.\n...The location data from that *one* Tuesday.\n\nSleep tight.\nWe\'ll be in touch.\n**You can NOT delete this.**',
                'safetyTitle': 'SYSTEM ERROR: HUMAN FALLIBILITY.',
                'safetyReveal': 'Relax.\nYou are not hacked.\n(But it was that easy.)'
            },
            'cs': {
                'lureTitle': 'KRITICKÁ CHYBA SYSTÉMU.<br>VYŽADOVÁN RUČNÍ RESET.',
                'lureButton': 'POTVRDIT RESET<br>(Pokud si troufáš)',
                'alertTitle': '!!! NAPADENÍ ZAŘÍZENÍ !!!',
                'attackSub': 'INICIALIZACE ZPĚTNÉHO PRŮNIKU...',
                'scaryReveal': 'STAV_SYSTÉMU: NAPADEN.\n\nZatímco jsi sledoval tento odpočet, náš **AI Proxy Bot** dokončil extrakci tvých dat.\n\nMáme **všechno**.\n...Trapná selfie.\n...Nepřečtené zprávy.\n...Údaje o poloze z *toho* úterního večera.\n\nDobrou noc.\nOzveme se ti.\n**Tohle smazat NEMŮŽEŠ.**',
                'safetyTitle': 'CHYBA SYSTÉMU: LIDSKÁ CHYBOVOST.',
                'safetyReveal': 'Klid.\nNebyl jsi hacknut.\n(Ale bylo to takhle snadné.)'
            },
            'sk': {
                'lureTitle': 'KRITICKÁ CHYBA SYSTÉMU.<br>VYŽADOVANÝ MANUÁLNY RESET.',
                'lureButton': 'POTVRDIŤ RESET<br>(Ak si trúfaš)',
                'alertTitle': '!!! NAPADNUTIE ZARIADENIA !!!',
                'attackSub': 'INICIALIZÁCIA SPÄTNÉHO PRIENIKU...',
                'scaryReveal': 'STAV_SYSTÉMU: NAPADNUTÝ.\n\nZatiaľ čo si sledoval tento odpočet, náš **AI Proxy Bot** dokončil extrakciu tvojich dát.\n\nMáme **všetko**.\n...Trapné selfies.\n...Neprečítané správy.\n...Údaje o polohe z *toho* utorkového večera.\n\nDobrú noc.\nOzveme sa ti.\n**Toto vymazať NEMÔŽEŠ.**',
                'safetyTitle': 'CHYBA SYSTÉMU: ĽUDSKÁ CHYBOVOSŤ.',
                'safetyReveal': 'Kľud.\nNebol si hacknutý.\n(Ale bolo to takéto jednoduché.)'
            }
        };

        let activeTranslations;

        function initialize() {
            let userLang = (navigator.language || navigator.userLanguage).split('-')[0];
            activeTranslations = PRANK_TRANSLATIONS[userLang] || PRANK_TRANSLATIONS['en'];

            document.getElementById('lureTitle').innerHTML = activeTranslations['lureTitle'];
            document.getElementById('lureButton').innerHTML = activeTranslations['lureButton'];
            document.getElementById('alertTitle').innerHTML = activeTranslations['alertTitle'];
            document.getElementById('attackSub').innerHTML = activeTranslations['attackSub'];
            document.getElementById('scaryText').innerText = activeTranslations['scaryReveal'];
            document.getElementById('safetyTitle').innerText = activeTranslations['safetyTitle'];
            document.getElementById('safetyText').innerText = activeTranslations['safetyReveal'];
        }

        document.getElementById('lureButton').addEventListener('click', () => {
            document.getElementById('lureDisplay').style.display = 'none';
            document.getElementById('attackDisplay').style.display = 'flex';
            startPrank();
        });

        function startPrank() {
            if ("vibrate" in navigator) {
                setTimeout(() => {
                    navigator.vibrate([100, 50, 100, 200, 1000, 500, 2000, 100, 100]);
                }, 1000);
            }

            let count = 10;
            const countdownEl = document.getElementById('countdown');
            const progressEl = document.getElementById('progressBar');

            const timer = setInterval(() => {
                count--;
                countdownEl.innerText = count;
                progressEl.style.width = (count * 10) + "%";

                if (count <= 0) {
                    clearInterval(timer);
                    showScaryPhase();
                }
            }, 1000);
        }

        function showScaryPhase() {
            document.getElementById('attackDisplay').style.display = 'none';
            document.getElementById('revealMessage').style.display = 'block';
            document.body.style.backgroundColor = '#200000';

            const scaryTextEl = document.getElementById('scaryText');
            scaryTextEl.addEventListener('animationend', (e) => {
                if (e.animationName === 'textTyping') {
                    setTimeout(() => {
                        showSafetyPhase();
                    }, 5000);
                }
            });
        }

        function showSafetyPhase() {
            document.getElementById('revealMessage').style.display = 'none';
            document.body.style.backgroundColor = 'black';
            document.getElementById('safetyReveal').style.display = 'block';
        }

        window.onload = initialize;
    </script>
</body>
</html>
