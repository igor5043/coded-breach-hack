<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coded Breach: System Compromised</title>
    <style>
        /* --- 1. GLOBAL STYLES (Cinematic Vibe) --- */
        body {
            background-color: black;
            color: #00ff00; /* Neon Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            cursor: pointer; /* Hint that interaction is needed */
        }

        /* --- 2. THE 3D CANVAS (Visible 0s - 13s) --- */
        #c {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- 3. REVEAL MESSAGE (15s+) --- */
        #revealMessage {
            display: none; /* Hidden by default */
            color: white;
            font-family: Arial, sans-serif;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            animation: textTyping 2s steps(40, end);
        }

        .finalText {
            font-size: 1.3em;
            font-weight: bold;
            line-height: 1.6;
        }

        .brandName {
            display: block;
            margin-top: 25px;
            font-size: 2.5em;
            color: red;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(255, 0, 0, 0.5);
        }

        /* --- 4. ANIMATIONS --- */
        @keyframes textTyping {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
</head>
<body id="breachBody">

    <canvas id="c"></canvas>

    <div id="revealMessage">
        <h1 style="color: red; font-family: 'Courier New', monospace;">SYSTEM ERROR: HUMAN FALLIBILITY.</h1>
        <p class="finalText">
            In 2026, the breach isn't digital; it's social.<br>
            Your trust is the backdoor. Wake up.
        </p>
        <p class="finalText">
            You have NOT been hacked.<br>
            ...But it was that easy.
        </p>
        <span class="brandName">Coded Breach</span>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r84/three.min.js"></script>

    <script>
        // Use a flag to ensure the prank only runs once.
        let prankStarted = false;

        // --- User interaction (a click) triggers the prank ---
        // This grants the 'vibrate' permission.
        document.getElementById('breachBody').addEventListener('click', () => {
            if (prankStarted) return;
            prankStarted = true;
            startBreachPrank();
        });

        function startBreachPrank() {
            if (!("vibrate" in navigator)) {
                console.log("Haptics not supported. Visuals only.");
                // (Skip haptics, just run visuals)
            } else {
                // VISCERAL HAPTICS START
                // Wait 1 second (suspense), then start.
                setTimeout(() => {
                    navigator.vibrate([
                        50, 100, 50, 200, 1500,  // Stutter, long rumble
                        200, 1500,               // Pause
                        50, 50, 50, 200,          // Quick triple tap
                        4000, 500,                // Long vibration
                        100, 100, 100             // Staccato bursts
                    ]);
                }, 1000);
            }

            // ==========================================================
            // --- 1. THREE.JS 3D ENGINE SETUP (AAA Graphics) ---
            // ==========================================================
            const canvas = document.querySelector('#c');
            const renderer = new THREE.WebGLRenderer({canvas, alpha: true, antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            const scene = new THREE.Scene();

            const fov = 75;
            const aspect = window.innerWidth / window.innerHeight;
            const near = 0.1;
            const far = 5;
            const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
            camera.position.z = 2;

            // --- A. THE ARTIFACT: "Neural Breach Cube" ---
            // A complex geometry made of cold, glowing lines.
            const geometry = new THREE.OctahedronGeometry(0.5, 0); // AAA geometry shape
            const material = new THREE.MeshPhongMaterial({
                color: 0x00ffff, // Cold Cyan
                shading: THREE.FlatShading,
                wireframe: true // AAA digital look
            });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // --- B. LIGHTING (Cinematic) ---
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(-1, 2, 4);
            scene.add(light);

            const subtleRed = new THREE.PointLight(0x300000, 1, 10); // Red contrast
            subtleRed.position.set(2, 2, 2);
            scene.add(subtleRed);

            // --- C. AAA VISUAL MELTDOWN SHADER (Glitch & Surge) ---
            // (Shaders integrated for real-time performance)
            let time = 0;
            material.onBeforeCompile = (shader) => {
                shader.uniforms.time = { value: 0 };
                shader.vertexShader = `
                    uniform float time;
                    ${shader.vertexShader}
                `.replace(
                    `#include <begin_vertex>`,
                    `
                    #include <begin_vertex>
                    // Glitch the geometry using time
                    transformed.x += sin(time * 20.0 + transformed.y * 10.0) * 0.1;
                    transformed.y += cos(time * 20.0 + transformed.x * 10.0) * 0.1;
                    `
                );
                material.userData.shader = shader;
            };

            // --- D. THE ANIMATION LOOP (Heartbeat) ---
            function render() {
                time += 0.01;
                // Only render if the canvas is visible
                if (canvas.style.display !== 'none') {
                    mesh.rotation.x += 0.005;
                    mesh.rotation.y += 0.01;

                    // Update the glitch shader time
                    if (material.userData.shader) {
                        material.userData.shader.uniforms.time.value = time;
                    }
                    renderer.render(scene, camera);
                }
                requestAnimationFrame(render);
            }
            requestAnimationFrame(render);

            // ==========================================================
            // --- PHASE 3: The Reveal (Second 15+) ---
            // ==========================================================
            setTimeout(() => {
                // 1. Stop all haptics permanently.
                if ("vibrate" in navigator) { navigator.vibrate(0); }

                // 2. Hide the 3D visual engine entirely.
                canvas.style.display = 'none';

                // 3. Display the final message.
                document.getElementById('revealMessage').style.display = 'block';

                // 4. Finalize the shift with a dark red background.
                document.body.style.backgroundColor = '#200000';
            }, 15000); // 15 seconds total.
        }
    </script>
</body>
</html>
