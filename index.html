    <style>
        /* --- 1. GLOBAL STYLES (Cinematic Vibe) --- */
        body {
            background-color: black;
            color: #00ff00; /* Neon Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden; /* Prevent scrolling during simulation */
        }

        /* --- 2. PHASE 1: THE TRAP (VISIBLE FIRST) --- */
        #lureDisplay {
            width: 80%;
            display: flex; /* Initially visible */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #lureTitle {
            font-size: 1.5em;
            color: white;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        #lureButton {
            background: none;
            color: #00ff00;
            border: 2px solid #00ff00;
            font-family: inherit;
            font-size: 1.4em;
            padding: 20px 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: blink 1.2s infinite; /* Make the button blink slowly */
        }

        /* --- 3. PHASE 2: ATTACK PROGRESS (0s - 10s) --- */
        #attackDisplay {
            width: 85%;
            display: none; /* Hidden initially */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #alertTitle {
            color: red;
            font-size: 2em;
            text-transform: uppercase;
            animation: blink 0.5s infinite; /* Fast blinking red title */
            margin-bottom: 20px;
        }

        /* Loading Bar (AAA Visualization) */
        #progressBarContainer {
            width: 100%;
            height: 30px;
            border: 2px solid #00ff00;
            background-color: #1a1a1a;
            position: relative;
            margin-bottom: 15px;
        }

        #progressBar {
            width: 100%; /* Start full */
            height: 100%;
            background-color: #00ff00;
            position: absolute;
            top: 0;
            left: 0;
        }

        #countdown {
            font-size: 3em;
            color: white;
            font-weight: bold;
            font-family: sans-serif; /* For a clear, sharp number */
            text-shadow: 2px 2px 10px rgba(0, 255, 0, 0.5);
        }

        /* --- 4. PHASE 3: THE REVEAL (Second 10+) --- */
        #revealMessage {
            display: none; /* Hidden by default */
            color: white;
            font-family: Arial, sans-serif;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
        }

        .finalText {
            font-size: 1.3em;
            font-weight: bold;
            line-height: 1.5;
            animation: textTyping 3s steps(40, end); /* Long typing effect */
            white-space: pre-wrap; /* Preserve line breaks */
            width: 100%; /* Ensure width is set for the typing effect */
        }

        /* --- 5. PHASE 4: THE SAFETY REVEAL (Triggered 5s later) --- */
        #safetyReveal {
            display: none; /* Hidden by default */
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
        }

        .finalSafetyText {
            font-size: 1.5em;
            font-weight: bold;
            line-height: 1.8;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0, 255, 0, 0.5);
            margin-bottom: 20px;
        }

        .brandName {
            display: block;
            margin-top: 35px;
            font-size: 2.5em;
            color: red;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(255, 0, 0, 0.5);
        }

        /* --- 6. ANIMATIONS (Glitch & Blink) --- */
        @keyframes blink { 50% { opacity: 0; } }

        /* A dynamic CRT screen flicker effect for realism */
        @keyframes crtFlicker {
            0% { opacity: 0.95; transform: scale(1); }
            5% { opacity: 1; transform: scale(1.002); }
            10% { opacity: 0.95; transform: scale(1); }
            100% { opacity: 0.95; transform: scale(1); }
        }

        /* Apply flicker to the entire attack screen initially */
        #attackDisplay { animation: crtFlicker 0.1s infinite; }

        @keyframes textTyping {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
</head>
<body id="breachBody">

                'lureButton': 'RESET BESTÄTIGEN<br>(Wenn du dich traust)',

                'attackSub': 'RÜCKWÄRTS-BRUCH INITIALISIERT...',
                'scaryReveal': 'SYSTEMSTATUS: GEFÄHRDET.<br><br>Während du diesen Countdown angesehen hast, hat unser **KI-Proxy-Bot** seinen Datenexfiltrations-Scan abgeschlossen.<br><br>Wir haben **alles**.<br>...Die peinlichen Selfies.<br>...Die ungelesenen Texte.<br>...Die Standortdaten von diesem *einen* Dienstag.<br><br>Schlaf gut.<br>Wir melden uns.<br>**Das kannst du NICHT löschen.**',

        // ==========================================================
        // --- 1. LANGUAGE DETECTION AND PAGE INITIALIZATION ---
        // ==========================================================
        window.addEventListener('load', initializeLocalizedPrank);

        function initializeLocalizedPrank() {
            // A. Detect the phone language (e.g., 'es-ES' becomes 'es')
            let userLang = navigator.language || navigator.userLanguage;
            userLang = userLang.split('-')[0]; // Extract base code

            console.log("Detected phone language: " + userLang);

            // B. Check if the detected language exists in our TRANSLATIONS object.
            let activeTranslations;
            if (PRANK_TRANSLATIONS.hasOwnProperty(userLang)) {
                console.log("Localized language found: " + userLang);
                activeTranslations = PRANK_TRANSLATIONS[userLang];
            } else {
                // FALLBACK: Use English if language is not defined.
                console.log("Language not found. Fallback to English.");
                activeTranslations = PRANK_TRANSLATIONS['en'];
            }

            // C. Populating the dynamic text areas on the page (before attack starts)
            document.getElementById('lureTitle').innerHTML = activeTranslations['lureTitle'];
            document.getElementById('lureButton').innerHTML = activeTranslations['lureButton'];
            document.getElementById('alertTitle').innerHTML = activeTranslations['alertTitle'];
            document.getElementById('attackSub').innerHTML = activeTranslations['attackSub'];
            document.getElementById('scaryText').innerHTML = activeTranslations['scaryReveal'];
            document.getElementById('safetyTitle').innerHTML = activeTranslations['safetyTitle'];
            document.getElementById('safetyText').innerHTML = activeTranslations['safetyReveal'];
        }


        // ==========================================================
        // --- CORE PRANK LOGIC (Final Safety Patched) ---
        // ==========================================================

        // Check if the browser supports vibration (Haptics)
        if (!("vibrate" in navigator)) {
            console.log("Haptics not supported. Visuals only.");
        }

        // --- User interaction triggers the prank ---
        document.getElementById('lureButton').addEventListener('click', () => {
            document.getElementById('lureDisplay').style.display = 'none';
            document.getElementById('attackDisplay').style.display = 'flex';
            startBreachAttack();
        });

        function startBreachAttack() {
            // VISCERAL HAPTICS START
            // (Android only.)
            if ("vibrate" in navigator) {
                setTimeout(() => {
                    navigator.vibrate([
                        50, 100, 50, 200, 1500,  // Stutter, long rumble
                        200, 1500,                // Pause
                        50, 50, 50, 200,          // Quick triple tap
                        4000, 500,                // Long vibration
                        100, 100, 100             // Staccato bursts
                    ]);
                }, 1000); // 1s suspense delay.
            }

            // --- PHASE 2: Attack Progress (Seconds 0 - 10) ---
            const countdownEl = document.getElementById('countdown');
            const progressBarEl = document.getElementById('progressBar');
            let count = 10;
            let progress = 100;

            const attackInterval = setInterval(() => {
                count--;
                progress -= 10; // Countdown 10% each second

                countdownEl.innerText = count;
                progressBarEl.style.width = progress + '%';

                if (count <= 0) {
                    clearInterval(attackInterval);
                    finalizeBreach(); // Finalize the prank.
                }
            }, 1000); // 1-second interval.
        }

        function finalizeBreach() {
            // 1. Ensure all haptics stop.
            if ("vibrate" in navigator) { navigator.vibrate(0); }

            // 2. Hide the attack visual.
            document.getElementById('attackDisplay').style.display = 'none';

            // 3. Display the localized first, scary message.
            document.getElementById('revealMessage').style.display = 'block';

            // 4. Set the final shift with a dark red background.
            document.body.style.backgroundColor = '#200000';

            // --- THE CONSECUTIVE HANDSHAKE FIX (Phase 3 -> Phase 4) ---
            const scaryTextEl = document.getElementById('scaryText');
            scaryTextEl.addEventListener('animationend', (event) => {
                if (event.animationName === 'textTyping') {
                    runSafetyRevealTimer();
                }
            });
        }

        function runSafetyRevealTimer() {
            // 15 seconds after typing finishes, trigger safety reveal.
            setTimeout(() => {
                // 1. Remove the scary message visual.
                document.getElementById('revealMessage').style.display = 'none';

                // 2. Clear the red background.
                document.body.style.backgroundColor = 'black';

                // 3. Display the final, localized safety message.
                document.getElementById('safetyReveal').style.display = 'block';

                // 4. Final visual confirmation is now green.
                document.body.style.color = '#00ff00';
            }, 15000); // TRIGGER THE SAFETY REVEAL 15 SECONDS LATER.
        }
    </script>
